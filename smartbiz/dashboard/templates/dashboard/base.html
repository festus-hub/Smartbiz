{% load crispy_forms_tags %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <head>
    <link rel="stylesheet" href="https://bootswatch.com/5/zephyr/bootstrap.min.css">
   </head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar {
            width: 220px;
            background: #1e293b;
            color: white;
            min-height: 100vh;
            padding: 20px;
            
        }
        

        .logo {
            margin-bottom: 30px;
        }

        .menu {
            list-style: none;
            padding: 0;
        }

        .menu li {
            margin-bottom: 10px;
        }

        .menu a {
            display: block;
            padding: 10px;
            color: #cbd5f5;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #334155;
            color: white;
        }

        .menu a.active {
            background: #3b82f6;
            color: white;
        }

        .section {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .main {
            padding: 20px;
        }
    </style>
</head>

<body>

    <div style="display: flex;">

        {% include 'dashboard/sidebar.html' %}

        <div style="flex: 1;">

            <div class="topbar">
            </div>

            <div class="main">
                {% block content %}
                {% endblock %}
            </div>

        </div>

    </div>


</body>
</html>
